<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a1a" />
    <meta name="description" content="Roboschool - Robototexnika va dasturlash o'quv markazi. AI yordamchi bilan suhbatlashing!" />
    <meta name="keywords" content="roboschool, robototexnika, dasturlash, arduino, python, AI, sun'iy intellekt, chinoz, toshkent" />
    <meta name="author" content="Rasul Israilov" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Roboschool - AI Yordamchi" />
    <meta property="og:description" content="Robototexnika va dasturlash o'quv markazi. 800+ bitiruvchi!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Roboschool - AI Yordamchi | Robototexnika O'quv Markazi</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d1f 100%);
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading screen */
      .loading-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d1f 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        background: conic-gradient(from 0deg, #00d4ff, #7b2ff7, #ff0080, #ff6b35, #00ff88, #00d4ff);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: spin 2s linear infinite;
        margin-bottom: 20px;
      }
      
      .loading-logo::before {
        content: '🤖';
        font-size: 40px;
        background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
        width: 70px;
        height: 70px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .loading-text {
        color: #00d4ff;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen -->
      <div class="loading-screen" id="loading">
        <div class="loading-logo"></div>
        <div class="loading-text">Yuklanmoqda...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide loading screen when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading')?.classList.add('hidden');
        }, 500);
      });
    </script>
  </body>
</html>
